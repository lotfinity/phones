
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>PriceBridge — Wholesale Electronics Sourcing</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; background: #f1f5f9; }
    html.dark body { background: #0f172a; }
    :root {
      --pb-accent: #2563eb;
      --pb-accent-light: #dbeafe;
      --pb-success: #059669;
      --pb-success-light: #d1fae5;
      --pb-warning: #d97706;
      --pb-warning-light: #fef3c7;
      --pb-danger: #dc2626;
      --pb-danger-light: #fee2e2;
      --pb-surface: #ffffff;
      --pb-bg: #f1f5f9;
      --pb-fg: #0f172a;
      --pb-fg2: #334155;
      --pb-muted: #64748b;
      --pb-border: #e2e8f0;
      --pb-border-soft: #f1f5f9;
    }
    html.dark {
      --pb-accent: #3b82f6;
      --pb-accent-light: #1e3a5f;
      --pb-success: #10b981;
      --pb-success-light: #064e3b;
      --pb-warning: #f59e0b;
      --pb-warning-light: #78350f;
      --pb-danger: #ef4444;
      --pb-danger-light: #7f1d1d;
      --pb-surface: #1e293b;
      --pb-bg: #0f172a;
      --pb-fg: #f1f5f9;
      --pb-fg2: #cbd5e1;
      --pb-muted: #94a3b8;
      --pb-border: #334155;
      --pb-border-soft: #1e293b;
    }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    .animate-fade-in { animation: fadeIn 0.2s ease-out; }
    .animate-scale-in { animation: scaleIn 0.2s cubic-bezier(0.16, 1, 0.3, 1); }
    input[type="range"] { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; background: #e2e8f0; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #2563eb; cursor: pointer; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="mockData.js"></script>
  <script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

const Icons = {
  home: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
  search: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
  cart: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>,
  heart: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>,
  heartFilled: (p) => <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>,
  user: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
  plus: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  minus: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  x: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
  chevronDown: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="6 9 12 15 18 9"/></svg>,
  chevronRight: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="9 18 15 12 9 6"/></svg>,
  chevronLeft: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="15 18 9 12 15 6"/></svg>,
  sun: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>,
  moon: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>,
  filter: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>,
  arrowLeft: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
  check: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="20 6 9 17 4 12"/></svg>,
  star: (p) => <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="1" {...p}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
  copy: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>,
  download: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
  zap: (p) => <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="1" {...p}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
  shield: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
  package: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>,
  clock: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
  trash: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
  image: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>,
  trendingUp: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>,
  target: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
  refreshCw: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>,
  settings: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
};

const fmt = (n) => n.toLocaleString('tr-TR');

function TrustBadge({ level }) {
  const colors = {
    Verified: 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400',
    High: 'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400',
    Standard: 'bg-slate-100 text-slate-600 dark:bg-slate-700 dark:text-slate-400',
  };
  return (
    <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium ${colors[level] || colors.Standard}`}>
      <Icons.shield className="w-3 h-3" />
      {level}
    </span>
  );
}

function ConditionBadge({ condition }) {
  const colors = {
    'Grade A+': 'bg-emerald-50 text-emerald-700 border-emerald-200 dark:bg-emerald-900/20 dark:text-emerald-400 dark:border-emerald-800',
    'Grade A': 'bg-blue-50 text-blue-700 border-blue-200 dark:bg-blue-900/20 dark:text-blue-400 dark:border-blue-800',
    'Grade A-': 'bg-indigo-50 text-indigo-700 border-indigo-200 dark:bg-indigo-900/20 dark:text-indigo-400 dark:border-indigo-800',
    'Grade B+': 'bg-amber-50 text-amber-700 border-amber-200 dark:bg-amber-900/20 dark:text-amber-400 dark:border-amber-800',
    'Grade B': 'bg-orange-50 text-orange-700 border-orange-200 dark:bg-orange-900/20 dark:text-orange-400 dark:border-orange-800',
  };
  return (
    <span className={`inline-flex items-center px-2 py-0.5 rounded text-xs font-medium border ${colors[condition] || colors['Grade B']}`}>
      {condition}
    </span>
  );
}

function DeviceImage({ device, className = '' }) {
  const [imgErr, setImgErr] = useState(false);
  return (
    <div className={`relative overflow-hidden bg-gradient-to-br from-slate-100 to-slate-200 dark:from-slate-700 dark:to-slate-800 ${className}`}>
      {!imgErr ? (
        <img src={device.images[0]} alt={device.model} className="w-full h-full object-contain p-4" onError={() => setImgErr(true)} loading="lazy" />
      ) : (
        <div className="flex flex-col items-center justify-center h-full gap-2 text-[var(--pb-muted)]">
          <Icons.image className="w-10 h-10 opacity-40" />
          <span className="text-xs font-medium">{device.model}</span>
        </div>
      )}
    </div>
  );
}

function BudgetBar({ budget, onEdit }) {
  const usedPct = (budget.used / budget.total) * 100;
  const remaining = budget.total - budget.used;
  const [editing, setEditing] = useState(false);
  const [editVal, setEditVal] = useState(String(budget.total));
  return (
    <div className="bg-[var(--pb-surface)] border border-[var(--pb-border)] rounded-xl p-4">
      <div className="flex items-center justify-between mb-3">
        <h3 className="text-sm font-semibold text-[var(--pb-fg)]">Your Budget</h3>
        <button onClick={() => { setEditing(!editing); setEditVal(String(budget.total)); }} className="text-xs text-[var(--pb-accent)] font-medium hover:underline">{editing ? 'Cancel' : 'Edit'}</button>
      </div>
      {editing ? (
        <div className="flex gap-2 mb-3">
          <input type="number" value={editVal} onChange={(e) => setEditVal(e.target.value)} className="flex-1 px-3 py-2 border border-[var(--pb-border)] rounded-lg text-sm bg-[var(--pb-surface)] text-[var(--pb-fg)] focus:outline-none focus:ring-2 focus:ring-[var(--pb-accent)]" />
          <button onClick={() => { onEdit(Number(editVal)); setEditing(false); }} className="px-3 py-2 bg-[var(--pb-accent)] text-white rounded-lg text-sm font-medium">Save</button>
        </div>
      ) : (
        <div className="grid grid-cols-3 gap-3 mb-3">
          <div><p className="text-xs text-[var(--pb-muted)]">Total</p><p className="text-sm font-bold text-[var(--pb-fg)]">{fmt(budget.total)} TRY</p></div>
          <div><p className="text-xs text-[var(--pb-muted)]">Used</p><p className="text-sm font-bold text-amber-600">{fmt(budget.used)} TRY</p></div>
          <div><p className="text-xs text-[var(--pb-muted)]">Remaining</p><p className="text-sm font-bold text-emerald-600">{fmt(remaining)} TRY</p></div>
        </div>
      )}
      <div className="h-2 bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden">
        <div className="h-full bg-[var(--pb-accent)] rounded-full transition-all duration-500" style={{ width: `${Math.min(usedPct, 100)}%` }} />
      </div>
      <p className="text-xs text-[var(--pb-muted)] mt-2">{budget.deviceCount} devices in plan</p>
    </div>
  );
}

function CategoryChips({ categories, active, onChange }) {
  return (
    <div className="flex gap-2 overflow-x-auto scrollbar-hide pb-1">
      {categories.map((cat) => (
        <button key={cat} onClick={() => onChange(cat)} className={`flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-medium transition-all ${active === cat ? 'bg-[var(--pb-accent)] text-white shadow-sm' : 'bg-[var(--pb-surface)] text-[var(--pb-fg2)] border border-[var(--pb-border)] hover:border-[var(--pb-accent)]'}`}>{cat}</button>
      ))}
    </div>
  );
}

function BottomSheet({ open, onClose, title, children }) {
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-50">
      <div className="absolute inset-0 bg-black/40" onClick={onClose} />
      <div className="absolute bottom-0 left-0 right-0 bg-[var(--pb-surface)] rounded-t-2xl max-h-[80vh] overflow-y-auto animate-slide-up">
        <div className="flex items-center justify-between p-4 border-b border-[var(--pb-border)]">
          <h3 className="text-base font-semibold text-[var(--pb-fg)]">{title}</h3>
          <button onClick={onClose} className="p-1 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg"><Icons.x className="w-5 h-5 text-[var(--pb-muted)]" /></button>
        </div>
        <div className="p-4">{children}</div>
      </div>
    </div>
  );
}

function DeviceCard({ device, onDetail, onTogglePlan, onToggleSave, role }) {
  return (
    <div className="bg-[var(--pb-surface)] border border-[var(--pb-border)] rounded-2xl overflow-hidden hover:shadow-lg transition-shadow duration-200">
      <div className="relative">
        <DeviceImage device={device} className="w-full h-48" />
        <div className="absolute top-3 left-3 flex gap-1.5">
          <ConditionBadge condition={device.condition} />
          {device.trustLevel === 'Verified' && <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400"><Icons.check className="w-3 h-3" /> Verified</span>}
        </div>
        <button onClick={(e) => { e.stopPropagation(); onToggleSave(device.id); }} className="absolute top-3 right-3 p-2 bg-white/80 dark:bg-slate-800/80 backdrop-blur rounded-full hover:bg-white dark:hover:bg-slate-700 transition-colors">
          {device.saved ? <Icons.heartFilled className="w-4 h-4 text-red-500" /> : <Icons.heart className="w-4 h-4 text-[var(--pb-muted)]" />}
        </button>
        {device.availability === 'Last one' && <div className="absolute bottom-3 left-3 px-2 py-0.5 bg-red-500 text-white text-xs font-bold rounded">Last one!</div>}
      </div>
      <div className="p-4">
        <div className="flex items-start justify-between gap-2 mb-1">
          <div><h3 className="text-base font-bold text-[var(--pb-fg)] leading-tight">{device.model}</h3><p className="text-sm text-[var(--pb-muted)]">{device.storage} · {device.color}</p></div>
          <span className="text-xs text-[var(--pb-muted)] whitespace-nowrap">{device.listingAge}</span>
        </div>
        <div className="flex flex-wrap gap-1.5 mt-2">
          {device.batteryHealth && <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded text-xs bg-slate-100 dark:bg-slate-700 text-[var(--pb-fg2)]">Battery {device.batteryHealth}%</span>}
          {device.boxIncluded && <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded text-xs bg-slate-100 dark:bg-slate-700 text-[var(--pb-fg2)]">Box included</span>}
          {device.accessoriesIncluded && <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded text-xs bg-slate-100 dark:bg-slate-700 text-[var(--pb-fg2)]">Full set</span>}
        </div>
        <div className="mt-4 pt-3 border-t border-[var(--pb-border)]">
          <p className="text-xs font-medium text-[var(--pb-muted)] mb-1">Delivered to your shop</p>
          <p className="text-xl font-extrabold text-[var(--pb-fg)]">{fmt(device.deliveredCost)} TRY</p>
        </div>
        <div className="grid grid-cols-2 gap-3 mt-3">
          <div className="bg-slate-50 dark:bg-slate-800/50 rounded-lg p-2.5"><p className="text-xs text-[var(--pb-muted)]">Türkiye resale</p><p className="text-sm font-bold text-[var(--pb-fg)]">{fmt(device.resaleRangeLow)}–{fmt(device.resaleRangeHigh)}</p></div>
          <div className="bg-emerald-50 dark:bg-emerald-900/20 rounded-lg p-2.5"><p className="text-xs text-emerald-600 dark:text-emerald-400">Expected profit</p><p className="text-sm font-bold text-emerald-600 dark:text-emerald-400">+{fmt(device.expectedProfit)} TRY</p></div>
        </div>
        <div className="flex gap-2 mt-4">
          <button onClick={() => onDetail(device.id)} className="flex-1 py-2.5 px-4 bg-[var(--pb-accent)] text-white rounded-xl text-sm font-semibold hover:bg-blue-700 transition-colors">Details</button>
          <button onClick={() => onTogglePlan(device.id)} className={`flex-shrink-0 py-2.5 px-4 rounded-xl text-sm font-semibold border transition-colors ${device.inPurchasePlan ? 'bg-emerald-50 border-emerald-300 text-emerald-700 dark:bg-emerald-900/20 dark:border-emerald-700 dark:text-emerald-400' : 'border-[var(--pb-border)] text-[var(--pb-fg2)] hover:border-[var(--pb-accent)]'}`}>{device.inPurchasePlan ? 'In Plan' : '+ Plan'}</button>
        </div>
        {role === 'internal' && <div className="mt-3 pt-3 border-t border-[var(--pb-border)]"><details className="text-xs"><summary className="cursor-pointer text-[var(--pb-muted)] font-medium">Management</summary><div className="mt-2 space-y-1 text-[var(--pb-muted)]"><p>DB ID: {device.id}</p><p>Source: {device.source} ({device.origin})</p><p>Seller: {device.seller} ({device.sellerDeals} deals)</p></div></details></div>}
      </div>
    </div>
  );
}

function DealsFeed({ devices, budget, setBudget, onDetail, onTogglePlan, onToggleSave, role }) {
  const [category, setCategory] = useState('All');
  const [sortSheet, setSortSheet] = useState(false);
  const [filterSheet, setFilterSheet] = useState(false);
  const [sortBy, setSortBy] = useState('profit');
  const [filterTrust, setFilterTrust] = useState('all');
  const [filterMinProfit, setFilterMinProfit] = useState(0);
  const [filterMaxCost, setFilterMaxCost] = useState(999999);
  const filtered = useMemo(() => {
    let list = devices;
    if (category !== 'All') list = list.filter((d) => d.brand === category || d.category === category);
    if (filterTrust !== 'all') list = list.filter((d) => d.trustLevel === filterTrust);
    list = list.filter((d) => d.expectedProfit >= filterMinProfit && d.deliveredCost <= filterMaxCost);
    const sorted = [...list];
    if (sortBy === 'profit') sorted.sort((a, b) => b.expectedProfit - a.expectedProfit);
    else if (sortBy === 'cost') sorted.sort((a, b) => a.deliveredCost - b.deliveredCost);
    else if (sortBy === 'newest') sorted.sort((a, b) => a.listingAge.localeCompare(b.listingAge));
    else if (sortBy === 'resale') sorted.sort((a, b) => b.resaleRangeHigh - a.resaleRangeHigh);
    return sorted;
  }, [devices, category, sortBy, filterTrust, filterMinProfit, filterMaxCost]);
  const sortOptions = [
    { id: 'profit', label: 'Highest expected profit' },
    { id: 'cost', label: 'Lowest delivered cost' },
    { id: 'newest', label: 'Newest listings first' },
    { id: 'resale', label: 'Highest resale value' },
  ];
  return (
    <div className="pb-24">
      <div className="sticky top-0 z-30 bg-[var(--pb-bg)]/80 backdrop-blur-xl border-b border-[var(--pb-border)]">
        <div className="px-4 pt-4 pb-3">
          <div className="flex items-center justify-between mb-1">
            <h1 className="text-xl font-extrabold text-[var(--pb-fg)]">Today's Deals</h1>
            <div className="flex items-center gap-2">
              <button onClick={() => setSortSheet(true)} className="p-2 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg transition-colors"><Icons.filter className="w-5 h-5 text-[var(--pb-muted)]" /></button>
              <button onClick={() => setFilterSheet(true)} className="p-2 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg transition-colors"><Icons.settings className="w-5 h-5 text-[var(--pb-muted)]" /></button>
            </div>
          </div>
          <p className="text-sm text-[var(--pb-muted)]">Real listings with the total delivered-to-shop cost included.</p>
        </div>
      </div>
      <div className="px-4 space-y-4 mt-4">
        <BudgetBar budget={budget} onEdit={(val) => setBudget({ ...budget, total: val })} />
        <CategoryChips categories={window.MOCK_CATEGORIES} active={category} onChange={setCategory} />
        <p className="text-sm text-[var(--pb-muted)]">{filtered.length} deals found</p>
        <div className="space-y-4">
          {filtered.map((d) => <DeviceCard key={d.id} device={d} onDetail={onDetail} onTogglePlan={onTogglePlan} onToggleSave={onToggleSave} role={role} />)}
        </div>
      </div>
      <BottomSheet open={sortSheet} onClose={() => setSortSheet(false)} title="Sort by">
        <div className="space-y-2">
          {sortOptions.map((opt) => (
            <button key={opt.id} onClick={() => { setSortBy(opt.id); setSortSheet(false); }} className={`w-full flex items-center justify-between p-3 rounded-xl text-left transition-colors ${sortBy === opt.id ? 'bg-[var(--pb-accent)]/10 text-[var(--pb-accent)]' : 'hover:bg-slate-50 dark:hover:bg-slate-800 text-[var(--pb-fg)]'}`}>
              <span className="text-sm font-medium">{opt.label}</span>
              {sortBy === opt.id && <Icons.check className="w-4 h-4" />}
            </button>
          ))}
        </div>
      </BottomSheet>
      <BottomSheet open={filterSheet} onClose={() => setFilterSheet(false)} title="Filters">
        <div className="space-y-5">
          <div>
            <label className="text-sm font-medium text-[var(--pb-fg)] mb-2 block">Trust level</label>
            <div className="flex gap-2">
              {['all', 'Verified', 'High', 'Standard'].map((t) => (
                <button key={t} onClick={() => setFilterTrust(t)} className={`px-3 py-1.5 rounded-lg text-sm font-medium transition-colors ${filterTrust === t ? 'bg-[var(--pb-accent)] text-white' : 'bg-slate-100 dark:bg-slate-700 text-[var(--pb-fg2)]'}`}>{t === 'all' ? 'All' : t}</button>
              ))}
            </div>
          </div>
          <div>
            <label className="text-sm font-medium text-[var(--pb-fg)] mb-2 block">Min profit: {fmt(filterMinProfit)} TRY</label>
            <input type="range" min="0" max="20000" step="500" value={filterMinProfit} onChange={(e) => setFilterMinProfit(Number(e.target.value))} className="w-full" />
          </div>
          <div>
            <label className="text-sm font-medium text-[var(--pb-fg)] mb-2 block">Max cost: {fmt(filterMaxCost)} TRY</label>
            <input type="range" min="10000" max="150000" step="5000" value={filterMaxCost} onChange={(e) => setFilterMaxCost(Number(e.target.value))} className="w-full" />
          </div>
          <button onClick={() => setFilterSheet(false)} className="w-full py-3 bg-[var(--pb-accent)] text-white rounded-xl font-semibold">Apply filters</button>
        </div>
      </BottomSheet>
    </div>
  );
}

function DeviceDetail({ device, onBack, onTogglePlan, onToggleSave, role }) {
  const [imgIdx, setImgIdx] = useState(0);
  const [costExpanded, setCostExpanded] = useState(false);
  const touchStart = useRef(null);
  if (!device) return <div className="p-8 text-center text-[var(--pb-muted)]">Device not found</div>;
  const onTouchStart = (e) => { touchStart.current = e.touches[0].clientX; };
  const onTouchEnd = (e) => {
    if (touchStart.current === null) return;
    const diff = touchStart.current - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) {
      if (diff > 0 && imgIdx < device.images.length - 1) setImgIdx(imgIdx + 1);
      if (diff < 0 && imgIdx > 0) setImgIdx(imgIdx - 1);
    }
    touchStart.current = null;
  };
  const iPhoneChecks = device.brand === 'Apple' ? [
    { label: 'Battery health', value: `${device.batteryHealth}%`, ok: device.batteryHealth >= 85 },
    { label: 'Cosmetic grade', value: device.cosmeticGrade, ok: true },
    { label: 'Screen condition', value: device.screenCondition, ok: !device.screenCondition?.includes('scratch') },
    { label: 'Face ID', value: device.faceId ? 'Working' : 'N/A', ok: device.faceId !== false },
    { label: 'Cameras', value: device.cameras, ok: device.cameras === 'All working' },
    { label: 'True Tone', value: device.trueTone ? 'Working' : 'N/A', ok: device.trueTone !== false },
    { label: 'Box', value: device.boxIncluded ? 'Included' : 'Not included', ok: device.boxIncluded },
    { label: 'Accessories', value: device.accessoriesIncluded ? 'Full set' : 'Not included', ok: device.accessoriesIncluded },
    { label: 'SIM config', value: device.simConfig, ok: true },
    { label: 'Region', value: device.region, ok: true },
    { label: 'IMEI check', value: device.imeiStatus, ok: device.imeiStatus === 'Clean' },
  ] : null;
  const costItems = [
    { label: 'Device purchase', value: device.costBreakdown.devicePurchase },
    { label: 'Currency conversion', value: device.costBreakdown.currencyConversion },
    { label: 'Travel allocation', value: device.costBreakdown.travelAllocation },
    { label: 'Transport', value: device.costBreakdown.transport },
    { label: 'Risk allowance', value: device.costBreakdown.riskAllowance },
    { label: 'Service and organization', value: device.costBreakdown.serviceAndOrganization },
  ];
  return (
    <div className="pb-24 min-h-screen bg-[var(--pb-bg)]">
      <div className="sticky top-0 z-30 bg-[var(--pb-bg)]/90 backdrop-blur-xl border-b border-[var(--pb-border)]">
        <div className="flex items-center justify-between px-4 py-3">
          <button onClick={onBack} className="flex items-center gap-2 text-[var(--pb-fg)]"><Icons.arrowLeft className="w-5 h-5" /><span className="text-sm font-medium">Back</span></button>
          <div className="flex gap-2">
            <button onClick={() => onToggleSave(device.id)} className="p-2 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg">{device.saved ? <Icons.heartFilled className="w-5 h-5 text-red-500" /> : <Icons.heart className="w-5 h-5 text-[var(--pb-muted)]" />}</button>
            <button className="p-2 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg"><Icons.copy className="w-5 h-5 text-[var(--pb-muted)]" /></button>
          </div>
        </div>
      </div>
      <div className="relative w-full aspect-square bg-gradient-to-br from-slate-100 to-slate-200 dark:from-slate-700 dark:to-slate-800 overflow-hidden" onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
        <div className="w-full h-full flex items-center justify-center">
          <img src={device.images[imgIdx]} alt={device.model} className="w-full h-full object-contain p-8" onError={(e) => { e.target.style.display = 'none'; }} />
        </div>
        {device.images.length > 1 && <div className="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-1.5">{device.images.map((_, i) => <div key={i} className={`w-2 h-2 rounded-full transition-colors ${i === imgIdx ? 'bg-[var(--pb-accent)]' : 'bg-white/50'}`} />)}</div>}
      </div>
      <div className="px-4 mt-4 space-y-5">
        <div>
          <div className="flex items-start justify-between gap-2">
            <div><h1 className="text-2xl font-extrabold text-[var(--pb-fg)] leading-tight">{device.model}</h1><p className="text-base text-[var(--pb-muted)] mt-1">{device.storage} · {device.color}</p></div>
            <TrustBadge level={device.trustLevel} />
          </div>
          <div className="flex flex-wrap gap-2 mt-3">
            <ConditionBadge condition={device.condition} />
            {device.batteryHealth && <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded text-xs font-medium bg-slate-100 dark:bg-slate-700 text-[var(--pb-fg2)]">Battery {device.batteryHealth}%</span>}
          </div>
          <p className="text-sm text-[var(--pb-fg2)] mt-3 leading-relaxed">{device.description}</p>
        </div>
        <div className="bg-[var(--pb-surface)] border border-[var(--pb-border)] rounded-2xl p-5">
          <p className="text-xs font-medium text-[var(--pb-muted)] uppercase tracking-wide mb-1">Delivered to your shop</p>
          <p className="text-3xl font-extrabold text-[var(--pb-fg)]">{fmt(device.deliveredCost)} TRY</p>
          <div className="grid grid-cols-2 gap-4 mt-4">
            <div className="bg-slate-50 dark:bg-slate-800/50 rounded-xl p-3"><p className="text-xs text-[var(--pb-muted)]">Türkiye resale range</p><p className="text-base font-bold text-[var(--pb-fg)]">{fmt(device.resaleRangeLow)}–{fmt(device.resaleRangeHigh)} TRY</p></div>
            <div className="bg-emerald-50 dark:bg-emerald-900/20 rounded-xl p-3"><p className="text-xs text-emerald-600 dark:text-emerald-400">Expected profit</p><p className="text-base font-bold text-emerald-600 dark:text-emerald-400">+{fmt(device.expectedProfit)} TRY ({device.profitPercent}%)</p></div>
          </div>
          <div className="grid grid-cols-2 gap-4 mt-3">
            <div className="bg-slate-50 dark:bg-slate-800/50 rounded-xl p-3"><p className="text-xs text-[var(--pb-muted)]">Quick sale estimate</p><p className="text-base font-bold text-[var(--pb-fg)]">{fmt(device.quickSalePrice)} TRY</p></div>
            <div className="bg-slate-50 dark:bg-slate-800/50 rounded-xl p-3"><p className="text-xs text-[var(--pb-muted)]">Estimated sale time</p><p className="text-base font-bold text-[var(--pb-fg)]">{device.estimatedSaleTime}</p></div>
          </div>
        </div>
        <div className="bg-[var(--pb-surface)] border border-[var(--pb-border)] rounded-2xl overflow-hidden">
          <button onClick={() => setCostExpanded(!costExpanded)} className="w-full flex items-center justify-between p-4 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
            <span className="text-sm font-semibold text-[var(--pb-fg)]">How the cost is built</span>
            <Icons.chevronDown className={`w-5 h-5 text-[var(--pb-muted)] transition-transform ${costExpanded ? 'rotate-180' : ''}`} />
          </button>
          {costExpanded && (
            <div className="px-4 pb-4 space-y-2 animate-fade-in">
              {costItems.map((item) => (
                <div key={item.label} className="flex items-center justify-between py-2 border-b border-[var(--pb-border-soft)] last:border-0">
                  <span className="text-sm text-[var(--pb-fg2)]">{item.label}</span>
                  <span className="text-sm font-medium text-[var(--pb-fg)]">{fmt(item.value)} TRY</span>
                </div>
              ))}
              <div className="flex items-center justify-between pt-2 border-t border-[var(--pb-border)]">
                <span className="text-sm font-bold text-[var(--pb-fg)]">Total delivered cost</span>
                <span className="text-base font-extrabold text-[var(--pb-accent)]">{fmt(device.costBreakdown.total)} TRY</span>
              </div>
            </div>
          )}
        </div>
        {iPhoneChecks && (
          <div className="bg-[var(--pb-surface)] border border-[var(--pb-border)] rounded-2xl p-4">
            <h3 className="text-sm font-semibold text-[var(--pb-fg)] mb-3">iPhone condition checklist</h3>
            <div className="space-y-2">
              {iPhoneChecks.map((chk) => (
                <div key={chk.label} className="flex items-center justify-between py-1.5">
                  <span className="text-sm text-[var(--pb-fg2)]">{chk.label}</span>
                  <div className="flex items-center gap-2">
                    <span className="text-sm font-medium text-[var(--pb-fg)]">{chk.value}</span>
                    {chk.ok ? <span className="w-5 h-5 rounded-full bg-emerald-100 dark:bg-emerald-900/30 flex items-center justify-center"><Icons.check className="w-3 h-3 text-emerald-600 dark:text-emerald-400" /></span> : <span className="w-5 h-5 rounded-full bg-amber-100 dark:bg-amber-900/30 flex items-center justify-center"><span className="text-xs text-amber-600">!</span></span>}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
        <div className="bg-[var(--pb-surface)] border border-[var(--pb-border)] rounded-2xl p-4">
          <h3 className="text-sm font-semibold text-[var(--pb-fg)] mb-2">Listing source</h3>
          <div className="flex items-center gap-3">
            <div className="w-10 h-10 rounded-full bg-slate-100 dark:bg-slate-700 flex items-center justify-center"><Icons.package className="w-5 h-5 text-[var(--pb-muted)]" /></div>
            <div><p className="text-sm font-medium text-[var(--pb-fg)]">{device.source} — {device.origin}</p><p className="text-xs text-[var(--pb-muted)]">Sold by {device.seller}</p></div>
          </div>
        </div>
        {role === 'internal' && <div className="bg-[var(--pb-surface)] border border-[var(--pb-border)] rounded-2xl p-4"><h3 className="text-sm font-semibold text-[var(--pb-fg)] mb-2">Internal management</h3><div className="space-y-1 text-sm text-[var(--pb-muted)]"><p>DB ID: {device.id}</p><p>Risk level: {device.riskLevel}</p></div></div>}
      </div>
      <div className="fixed bottom-0 left-0 right-0 bg-[var(--pb-surface)]/95 backdrop-blur-xl border-t border-[var(--pb-border)] px-4 py-3 z-40">
        <button onClick={() => onTogglePlan(device.id)} className={`w-full py-3.5 rounded-xl font-semibold text-base transition-colors ${device.inPurchasePlan ? 'bg-emerald-100 text-emerald-700 border border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-700' : 'bg-[var(--pb-accent)] text-white hover:bg-blue-700'}`}>{device.inPurchasePlan ? 'Remove from Purchase Plan' : 'Add to Purchase Plan'}</button>
      </div>
    </div>
  );
}

function PurchasePlan({ devices, budget, onDetail, onTogglePlan }) {
  const planDevices = devices.filter((d) => d.inPurchasePlan);
  const totalCost = planDevices.reduce((s, d) => s + d.deliveredCost, 0);
  const totalResale = planDevices.reduce((s, d) => s + d.resaleRangeLow, 0);
  const totalProfit = planDevices.reduce((s, d) => s + d.expectedProfit, 0);
  const avgProfit = planDevices.length ? Math.round(totalProfit / planDevices.length) : 0;
  const remaining = budget.total - totalCost;
  const usedPct = (totalCost / budget.total) * 100;
  return (
    <div className="pb-24">
      <div className="sticky top-0 z-30 bg-[var(--pb-bg)]/80 backdrop-blur-xl border-b border-[var(--pb-border)]">
        <div className="px-4 pt-4 pb-3"><h1 className="text-xl font-extrabold text-[var(--pb-fg)]">Purchase Plan</h1><p className="text-sm text-[var(--pb-muted)]">Your curated device basket for import</p></div>
      </div>
      <div className="px-4 mt-4 space-y-4">
        <div className="bg-[var(--pb-surface)] border border-[var(--pb-border)] rounded-2xl p-4">
          <div className="grid grid-cols-2 gap-4 mb-4">
            <div><p className="text-xs text-[var(--pb-muted)]">Total budget</p><p className="text-lg font-bold text-[var(--pb-fg)]">{fmt(budget.total)} TRY</p></div>
            <div><p className="text-xs text-[var(--pb-muted)]">Remaining</p><p className={`text-lg font-bold ${remaining >= 0 ? 'text-emerald-600' : 'text-red-600'}`}>{fmt(remaining)} TRY</p></div>
          </div>
          <div className="h-2.5 bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden">
            <div className={`h-full rounded-full transition-all duration-500 ${usedPct > 90 ? 'bg-red-500' : usedPct > 70 ? 'bg-amber-500' : 'bg-[var(--pb-accent)]'}`} style={{ width: `${Math.min(usedPct, 100)}%` }} />
          </div>
          <div className="grid grid-cols-4 gap-2 mt-4 text-center">
            <div className="bg-slate-50 dark:bg-slate-800/50 rounded-lg p-2"><p className="text-xs text-[var(--pb-muted)]">Devices</p><p className="text-lg font-bold text-[var(--pb-fg)]">{planDevices.length}</p></div>
            <div className="bg-slate-50 dark:bg-slate-800/50 rounded-lg p-2"><p className="text-xs text-[var(--pb-muted)]">Total cost</p><p className="text-lg font-bold text-[var(--pb-fg)]">{fmt(totalCost)}</p></div>
            <div className="bg-emerald-50 dark:bg-emerald-900/20 rounded-lg p-2"><p className="text-xs text-emerald-600 dark:text-emerald-400">Resale</p><p className="text-lg font-bold text-emerald-600 dark:text-emerald-400">{fmt(totalResale)}</p></div>
            <div className="bg-emerald-50 dark:bg-emerald-900/20 rounded-lg p-2"><p className="text-xs text-emerald-600 dark:text-emerald-400">Profit</p><p className="text-lg font-bold text-emerald-600 dark:text-emerald-400">+{fmt(totalProfit)}</p></div>
          </div>
          <div className="mt-3 pt-3 border-t border-[var(--pb-border)]"><p className="text-sm text-[var(--pb-muted)]">Average profit per device: <span className="font-semibold text-emerald-600">{fmt(avgProfit)} TRY</span></p></div>
        </div>
        {planDevices.length === 0 ? (
          <div className="text-center py-12"><Icons.cart className="w-12 h-12 text-[var(--pb-border)] mx-auto mb-3" /><p className="text-[var(--pb-muted)]">No devices in your plan yet</p><p className="text-sm text-[var(--pb-muted)] mt-1">Browse deals and add devices to build your import plan</p></div>
        ) : (
          <div className="space-y-3">
            {planDevices.map((d) => (
              <div key={d.id} className="bg-[var(--pb-surface)] border border-[var(--pb-border)] rounded-xl p-4">
                <div className="flex gap-3">
                  <DeviceImage device={d} className="w-16 h-16 rounded-lg flex-shrink-0" />
                  <div className="flex-1 min-w-0">
                    <h3 className="text-sm font-bold text-[var(--pb-fg)] leading-tight">{d.model}</h3>
                    <p className="text-xs text-[var(--pb-muted)]">{d.storage} · {d.color}</p>
                    <div className="flex items-center gap-2 mt-1"><ConditionBadge condition={d.condition} />{d.batteryHealth && <span className="text-xs text-[var(--pb-muted)]">Bat {d.batteryHealth}%</span>}</div>
                  </div>
                  <div className="text-right flex-shrink-0"><p className="text-sm font-bold text-[var(--pb-fg)]">{fmt(d.deliveredCost)} TRY</p><p className="text-xs font-medium text-emerald-600">+{fmt(d.expectedProfit)}</p></div>
                </div>
                <div className="flex gap-2 mt-3 pt-3 border-t border-[var(--pb-border-soft)]">
                  <button onClick={() => onDetail(d.id)} className="flex-1 py-2 text-xs font-medium text-[var(--pb-accent)] border border-[var(--pb-border)] rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800">Details</button>
                  <button onClick={() => onTogglePlan(d.id)} className="py-2 px-3 text-xs font-medium text-red-500 border border-red-200 dark:border-red-800 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20">Remove</button>
                </div>
              </div>
            ))}
          </div>
        )}
        {planDevices.length > 0 && (
          <div className="space-y-3 mt-6">
            <button className="w-full py-3.5 bg-[var(--pb-accent)] text-white rounded-xl font-semibold text-base hover:bg-blue-700 transition-colors">Confirm Purchase Plan</button>
            <button className="w-full py-3 border border-[var(--pb-border)] text-[var(--pb-fg2)] rounded-xl font-semibold text-sm hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors flex items-center justify-center gap-2"><Icons.download className="w-4 h-4" />Export Summary</button>
          </div>
        )}
      </div>
    </div>
  );
}

function BudgetOptimizer({ devices }) {
  const [budgetInput, setBudgetInput] = useState(500000);
  const [strategy, setStrategy] = useState('balanced');
  const [constraints, setConstraints] = useState({ maxDevices: 10, maxPerModel: 2, minBattery: 80, minCondition: 'Grade B', maxCost: 80000, minProfit: 3000, preferredBrands: [] });
  const [plan, setPlan] = useState(null);
  const [generating, setGenerating] = useState(false);
  const strategies = [
    { id: 'profit', label: 'Highest total profit', icon: Icons.trendingUp, desc: 'Maximize earnings regardless of speed' },
    { id: 'fast', label: 'Fastest-selling devices', icon: Icons.clock, desc: 'Quick turnover, lower risk' },
    { id: 'lowrisk', label: 'Lowest risk', icon: Icons.shield, desc: 'Only verified, high-trust listings' },
    { id: 'iphone', label: 'Most iPhones', icon: Icons.target, desc: 'Apple-heavy basket' },
    { id: 'balanced', label: 'Balanced plan', icon: Icons.refreshCw, desc: 'Good mix of profit and speed' },
    { id: 'fewer', label: 'Fewer devices, higher profit', icon: Icons.zap, desc: '3-5 premium devices only' },
    { id: 'more', label: 'More devices, faster turnover', icon: Icons.package, desc: '7-10 devices, quick flips' },
  ];
  const generatePlan = () => {
    setGenerating(true);
    setTimeout(() => {
      const sorted = [...devices].sort((a, b) => {
        if (strategy === 'profit') return b.expectedProfit - a.expectedProfit;
        if (strategy === 'fast') return a.estimatedSaleTime.localeCompare(b.estimatedSaleTime);
        if (strategy === 'lowrisk') return (b.trustLevel === 'Verified' ? 1 : 0) - (a.trustLevel === 'Verified' ? 1 : 0);
        if (strategy === 'iphone') return (b.brand === 'Apple' ? 1 : 0) - (a.brand === 'Apple' ? 1 : 0);
        if (strategy === 'fewer') return b.profitPercent - a.profitPercent;
        if (strategy === 'more') return a.deliveredCost - b.deliveredCost;
        return (b.expectedProfit * 0.6 + b.profitPercent * 0.4) - (a.expectedProfit * 0.6 + a.profitPercent * 0.4);
      });
      let remaining = budgetInput;
      const basket = [];
      for (const d of sorted) {
        if (basket.length >= constraints.maxDevices) break;
        if (d.deliveredCost > constraints.maxCost) continue;
        if (d.expectedProfit < constraints.minProfit) continue;
        if (d.batteryHealth < constraints.minBattery) continue;
        if (!['Grade A', 'Grade A+', 'Grade A-'].includes(d.condition)) continue;
        if (remaining - d.deliveredCost < 0) continue;
        if (basket.filter((b) => b.model === d.model).length >= constraints.maxPerModel) continue;
        basket.push(d);
        remaining -= d.deliveredCost;
      }
      const totalCost = basket.reduce((s, d) => s + d.deliveredCost, 0);
      const totalProfit = basket.reduce((s, d) => s + d.expectedProfit, 0);
      const avgRisk = basket.filter((d) => d.riskLevel === 'Low').length / Math.max(basket.length, 1);
      setPlan({ devices: basket, totalCost, totalResale: basket.reduce((s, d) => s + d.resaleRangeLow, 0), totalProfit, riskLevel: avgRisk > 0.7 ? 'Low' : avgRisk > 0.4 ? 'Medium' : 'High', remaining });
      setGenerating(false);
    }, 1200);
  };
  return (
    <div className="pb-24">
      <div className="sticky top-0 z-30 bg-[var(--pb-bg)]/80 backdrop-blur-xl border-b border-[var(--pb-border)]">
        <div className="px-4 pt-4 pb-3"><h1 className="text-xl font-extrabold text-[var(--pb-fg)]">Build a Plan for Your Budget</h1><p className="text-sm text-[var(--pb-muted)]">Set your budget and strategy, we'll find the best basket</p></div>
      </div>
      <div className="px-4 mt-4 space-y-5">
        <div className="bg-[var(--pb-surface)] border border-[var(--pb-border)] rounded-2xl p-4">
          <label className="text-sm font-medium text-[var(--pb-fg)] mb-2 block">Your budget</label>
          <div className="flex gap-2">
            <input type="number" value={budgetInput} onChange={(e) => setBudgetInput(Number(e.target.value))} className="flex-1 px-4 py-3 border border-[var(--pb-border)] rounded-xl text-lg font-bold bg-[var(--pb-surface)] text-[var(--pb-fg)] focus:outline-none focus:ring-2 focus:ring-[var(--pb-accent)]" />
            <span className="flex items-center text-sm text-[var(--pb-muted)]">TRY</span>
          </div>
        </div>
        <div className="bg-[var(--pb-surface)] border border-[var(--pb-border)] rounded-2xl p-4">
          <label className="text-sm font-medium text-[var(--pb-fg)] mb-3 block">Strategy</label>
          <div className="space-y-2">
            {strategies.map((s) => (
              <button key={s.id} onClick={() => setStrategy(s.id)} className={`w-full flex items-start gap-3 p-3 rounded-xl text-left transition-colors ${strategy === s.id ? 'bg-[var(--pb-accent)]/10 border border-[var(--pb-accent)]' : 'border border-[var(--pb-border)] hover:border-[var(--pb-accent)]/50'}`}>
                <s.icon className={`w-5 h-5 mt-0.5 flex-shrink-0 ${strategy === s.id ? 'text-[var(--pb-accent)]' : 'text-[var(--pb-muted)]'}`} />
                <div><p className={`text-sm font-medium ${strategy === s.id ? 'text-[var(--pb-accent)]' : 'text-[var(--pb-fg)]'}`}>{s.label}</p><p className="text-xs text-[var(--pb-muted)] mt-0.5">{s.desc}</p></div>
              </button>
            ))}
          </div>
        </div>
        <div className="bg-[var(--pb-surface)] border border-[var(--pb-border)] rounded-2xl p-4">
          <label className="text-sm font-medium text-[var(--pb-fg)] mb-3 block">Constraints</label>
          <div className="grid grid-cols-2 gap-3">
            <div><label className="text-xs text-[var(--pb-muted)]">Max devices</label><input type="number" value={constraints.maxDevices} onChange={(e) => setConstraints({ ...constraints, maxDevices: Number(e.target.value) })} className="w-full px-3 py-2 border border-[var(--pb-border)] rounded-lg text-sm bg-[var(--pb-surface)] text-[var(--pb-fg)]" /></div>
            <div><label className="text-xs text-[var(--pb-muted)]">Max per model</label><input type="number" value={constraints.maxPerModel} onChange={(e) => setConstraints({ ...constraints, maxPerModel: Number(e.target.value) })} className="w-full px-3 py-2 border border-[var(--pb-border)] rounded-lg text-sm bg-[var(--pb-surface)] text-[var(--pb-fg)]" /></div>
            <div><label className="text-xs text-[var(--pb-muted)]">Min battery %</label><input type="number" value={constraints.minBattery} onChange={(e) => setConstraints({ ...constraints, minBattery: Number(e.target.value) })} className="w-full px-3 py-2 border border-[var(--pb-border)] rounded-lg text-sm bg-[var(--pb-surface)] text-[var(--pb-fg)]" /></div>
            <div><label className="text-xs text-[var(--pb-muted)]">Max cost per device</label><input type="number" value={constraints.maxCost} onChange={(e) => setConstraints({ ...constraints, maxCost: Number(e.target.value) })} className="w-full px-3 py-2 border border-[var(--pb-border)] rounded-lg text-sm bg-[var(--pb-surface)] text-[var(--pb-fg)]" /></div>
            <div className="col-span-2"><label className="text-xs text-[var(--pb-muted)]">Min expected profit</label><input type="number" value={constraints.minProfit} onChange={(e) => setConstraints({ ...constraints, minProfit: Number(e.target.value) })} className="w-full px-3 py-2 border border-[var(--pb-border)] rounded-lg text-sm bg-[var(--pb-surface)] text-[var(--pb-fg)]" /></div>
          </div>
        </div>
        <button onClick={generatePlan} disabled={generating} className="w-full py-3.5 bg-[var(--pb-accent)] text-white rounded-xl font-semibold text-base hover:bg-blue-700 transition-colors disabled:opacity-50">{generating ? 'Generating plan...' : 'Generate optimized plan'}</button>
        {plan && (
          <div className="space-y-4 animate-fade-in">
            <div className="bg-[var(--pb-surface)] border border-[var(--pb-border)] rounded-2xl p-4">
              <div className="flex items-center gap-2 mb-3"><Icons.zap className="w-5 h-5 text-[var(--pb-accent)]" /><h3 className="text-sm font-semibold text-[var(--pb-fg)]">Recommended basket</h3></div>
              <div className="grid grid-cols-2 gap-3 mb-4">
                <div className="bg-slate-50 dark:bg-slate-800/50 rounded-lg p-2.5"><p className="text-xs text-[var(--pb-muted)]">Total cost</p><p className="text-sm font-bold text-[var(--pb-fg)]">{fmt(plan.totalCost)} TRY</p></div>
                <div className="bg-emerald-50 dark:bg-emerald-900/20 rounded-lg p-2.5"><p className="text-xs text-emerald-600 dark:text-emerald-400">Expected profit</p><p className="text-sm font-bold text-emerald-600 dark:text-emerald-400">+{fmt(plan.totalProfit)} TRY</p></div>
                <div className="bg-slate-50 dark:bg-slate-800/50 rounded-lg p-2.5"><p className="text-xs text-[var(--pb-muted)]">Remaining budget</p><p className="text-sm font-bold text-[var(--pb-fg)]">{fmt(plan.remaining)} TRY</p></div>
                <div className="bg-slate-50 dark:bg-slate-800/50 rounded-lg p-2.5"><p className="text-xs text-[var(--pb-muted)]">Risk level</p><p className={`text-sm font-bold ${plan.riskLevel === 'Low' ? 'text-emerald-600' : plan.riskLevel === 'Medium' ? 'text-amber-600' : 'text-red-600'}`}>{plan.riskLevel}</p></div>
              </div>
            </div>
            {plan.devices.map((d) => (
              <div key={d.id} className="bg-[var(--pb-surface)] border border-[var(--pb-border)] rounded-xl p-3 flex gap-3">
                <DeviceImage device={d} className="w-14 h-14 rounded-lg flex-shrink-0" />
                <div className="flex-1 min-w-0"><h4 className="text-sm font-bold text-[var(--pb-fg)]">{d.model}</h4><p className="text-xs text-[var(--pb-muted)]">{d.storage} · {d.condition}</p></div>
                <div className="text-right flex-shrink-0"><p className="text-sm font-bold text-[var(--pb-fg)]">{fmt(d.deliveredCost)} TRY</p><p className="text-xs font-medium text-emerald-600">+{fmt(d.expectedProfit)}</p></div>
              </div>
            ))}
            <div className="bg-blue-50 dark:bg-blue-900/20 rounded-xl p-4 text-sm text-blue-700 dark:text-blue-300">
              <p className="font-medium mb-1">Why this plan?</p>
              <p>{strategy === 'profit' && 'This basket maximizes total expected profit by selecting the highest-earning devices within your budget and constraints.'}{strategy === 'fast' && 'This basket prioritizes devices with the shortest estimated sale time.'}{strategy === 'lowrisk' && 'This basket only includes verified listings from trusted sellers.'}{strategy === 'iphone' && 'This basket focuses on Apple devices which have the strongest resale market in Türkiye.'}{strategy === 'balanced' && 'This basket balances profit potential, sale speed, and risk.'}{strategy === 'fewer' && 'This basket concentrates your budget into fewer high-value devices.'}{strategy === 'more' && 'This basket spreads your budget across more devices for diversified returns.'}</p>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function SearchScreen({ devices, onDetail, onTogglePlan, onToggleSave, role }) {
  const [query, setQuery] = useState('');
  const [searched, setSearched] = useState(false);
  const results = useMemo(() => {
    if (!query.trim()) return [];
    const q = query.toLowerCase();
    return devices.filter((d) => d.model.toLowerCase().includes(q) || d.brand.toLowerCase().includes(q) || d.category.toLowerCase().includes(q) || d.storage.toLowerCase().includes(q));
  }, [devices, query]);
  const grouped = useMemo(() => {
    const groups = {};
    results.forEach((d) => { if (!groups[d.brand]) groups[d.brand] = []; groups[d.brand].push(d); });
    return groups;
  }, [results]);
  const handleSearch = (q) => { setQuery(q); setSearched(true); };
  return (
    <div className="pb-24">
      <div className="sticky top-0 z-30 bg-[var(--pb-bg)]/80 backdrop-blur-xl border-b border-[var(--pb-border)]">
        <div className="px-4 pt-4 pb-3">
          <h1 className="text-xl font-extrabold text-[var(--pb-fg)] mb-3">Search</h1>
          <div className="relative"><Icons.search className="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-[var(--pb-muted)]" /><input type="text" value={query} onChange={(e) => handleSearch(e.target.value)} placeholder="Search models, brands, categories..." className="w-full pl-10 pr-4 py-3 bg-[var(--pb-surface)] border border-[var(--pb-border)] rounded-xl text-sm text-[var(--pb-fg)] focus:outline-none focus:ring-2 focus:ring-[var(--pb-accent)] focus:border-transparent" /></div>
        </div>
      </div>
      <div className="px-4 mt-4">
        {!searched ? (
          <div className="space-y-5">
            <div>
              <h3 className="text-sm font-semibold text-[var(--pb-fg)] mb-3">Recent searches</h3>
              <div className="space-y-1">
                {window.MOCK_RECENT_SEARCHES.map((s) => (
                  <button key={s} onClick={() => handleSearch(s)} className="flex items-center gap-3 w-full p-2.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-left transition-colors"><Icons.clock className="w-4 h-4 text-[var(--pb-muted)]" /><span className="text-sm text-[var(--pb-fg2)]">{s}</span></button>
                ))}
              </div>
            </div>
            <div>
              <h3 className="text-sm font-semibold text-[var(--pb-fg)] mb-3">Suggested models</h3>
              <div className="flex flex-wrap gap-2">
                {window.MOCK_SUGGESTED_MODELS.map((m) => (
                  <button key={m} onClick={() => handleSearch(m)} className="px-3 py-1.5 bg-[var(--pb-surface)] border border-[var(--pb-border)] rounded-full text-sm text-[var(--pb-fg2)] hover:border-[var(--pb-accent)] transition-colors">{m}</button>
                ))}
              </div>
            </div>
          </div>
        ) : results.length === 0 ? (
          <div className="text-center py-12"><Icons.search className="w-12 h-12 text-[var(--pb-border)] mx-auto mb-3" /><p className="text-[var(--pb-muted)]">No results for "{query}"</p></div>
        ) : (
          <div className="space-y-5">
            {Object.entries(grouped).map(([brand, devs]) => (
              <div key={brand}>
                <h3 className="text-sm font-semibold text-[var(--pb-muted)] mb-2">{brand} ({devs.length})</h3>
                <div className="space-y-3">{devs.map((d) => <DeviceCard key={d.id} device={d} onDetail={onDetail} onTogglePlan={onTogglePlan} onToggleSave={onToggleSave} role={role} />)}</div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function SavedDevices({ devices, onDetail, onTogglePlan, onToggleSave }) {
  const saved = devices.filter((d) => d.saved);
  const [compareIds, setCompareIds] = useState([]);
  const [showCompare, setShowCompare] = useState(false);
  const toggleCompare = (id) => { setCompareIds((prev) => { if (prev.includes(id)) return prev.filter((x) => x !== id); if (prev.length >= 4) return prev; return [...prev, id]; }); };
  const compareDevices = devices.filter((d) => compareIds.includes(d.id));
  const comparisonFields = [
    { label: 'Delivered cost', get: (d) => `${fmt(d.deliveredCost)} TRY` },
    { label: 'Battery', get: (d) => d.batteryHealth ? `${d.batteryHealth}%` : 'N/A' },

    { label: 'Expected profit', get: (d) => `+${fmt(d.expectedProfit)} TRY` },

        ) : (
          <div className="space-y-3">

                  <DeviceImage device={d} className="w-16 h-16 rounded-lg flex-shrink-0" />
                  <div className="flex-1 min-w-0">
                    <h3 className="text-sm font-bold text-[var(--pb-fg)] leading-tight">{d.model}</h3>
                    <p className="text-xs text-[var(--pb-muted)]">{d.storage} · {d.condition}</p>
                    <div className="flex items-center gap-3 mt-1.5"><span className="text-sm font-bold text-[var(--pb-fg)]">{fmt(d.deliveredCost)} TRY</span><span className="text-xs font-medium text-emerald-600">+{fmt(d.expectedProfit)}</span></div>
                  </div>
                  <button onClick={() => onToggleSave(d.id)} className="p-1.5 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg flex-shrink-0"><Icons.heartFilled className="w-5 h-5 text-red-500" /></button>
                </div>

                  <div className="w-px bg-[var(--pb-border-soft)]" />

            <div className="flex items-center justify-between p-4 border-b border-[var(--pb-border)]">
              <h3 className="text-base font-semibold text-[var(--pb-fg)]">Compare devices</h3>

  );
}

                <div className="absolute right-0 top-full mt-1 bg-[var(--pb-surface)] border border-[var(--pb-border)] rounded-xl shadow-lg py-1 min-w-[120px] animate-scale-in z-50">
                  <button onClick={() => { setRole('buyer'); setRoleMenu(false); }} className={`w-full text-left px-4 py-2 text-sm ${role === 'buyer' ? 'text-[var(--pb-accent)] bg-[var(--pb-accent)]/5' : 'text-[var(--pb-fg2)]'} hover:bg-slate-50 dark:hover:bg-slate-800`}>Buyer</button>
                  <button onClick={() => { setRole('internal'); setRoleMenu(false); }} className={`w-full text-left px-4 py-2 text-sm ${role === 'internal' ? 'text-purple-600 bg-purple-50 dark:bg-purple-900/20' : 'text-[var(--pb-fg2)]'} hover:bg-slate-50 dark:hover:bg-slate-800`}>Internal</button>
                </div>
              )}
            </div>
          </div>
        </div>
      </div>
      <div className="pt-12">
        {screen === 'detail' && detailDevice ? <DeviceDetail device={detailDevice} onBack={handleBack} onTogglePlan={togglePlan} onToggleSave={toggleSave} role={role} />
        : screen === 'deals' ? <DealsFeed devices={devices} budget={budget} setBudget={setBudget} onDetail={handleDetail} onTogglePlan={togglePlan} onToggleSave={toggleSave} role={role} />
        : screen === 'search' ? <SearchScreen devices={devices} onDetail={handleDetail} onTogglePlan={togglePlan} onToggleSave={toggleSave} role={role} />
        : screen === 'plan' ? <PurchasePlan devices={devices} budget={budget} onDetail={handleDetail} onTogglePlan={togglePlan} />
        : screen === 'saved' ? <SavedDevices devices={devices} onDetail={handleDetail} onTogglePlan={togglePlan} onToggleSave={toggleSave} />
        : (
          <div className="pb-24 px-4 pt-8">
            <h1 className="text-xl font-extrabold text-[var(--pb-fg)] mb-6">Account</h1>
            <div className="bg-[var(--pb-surface)] border border-[var(--pb-border)] rounded-2xl p-5">
              <div className="flex items-center gap-4 mb-6">
                <div className="w-14 h-14 rounded-full bg-[var(--pb-accent)]/10 flex items-center justify-center"><Icons.user className="w-7 h-7 text-[var(--pb-accent)]" /></div>
                <div><p className="font-bold text-[var(--pb-fg)]">Ahmet Yilmaz</p><p className="text-sm text-[var(--pb-muted)]">Istanbul Electronics</p></div>
              </div>
              <div className="space-y-3">
                <div className="flex items-center justify-between py-3 border-b border-[var(--pb-border-soft)]"><span className="text-sm text-[var(--pb-fg2)]">Business name</span><span className="text-sm font-medium text-[var(--pb-fg)]">Istanbul Electronics</span></div>
                <div className="flex items-center justify-between py-3 border-b border-[var(--pb-border-soft)]"><span className="text-sm text-[var(--pb-fg2)]">Location</span><span className="text-sm font-medium text-[var(--pb-fg)]">Istanbul, Türkiye</span></div>
                <div className="flex items-center justify-between py-3 border-b border-[var(--pb-border-soft)]"><span className="text-sm text-[var(--pb-fg2)]">Budget</span><span className="text-sm font-bold text-[var(--pb-accent)]">{fmt(budget.total)} TRY</span></div>
                <div className="flex items-center justify-between py-3"><span className="text-sm text-[var(--pb-fg2)]">Member since</span><span className="text-sm font-medium text-[var(--pb-fg)]">Jan 2025</span></div>
              </div>
            </div>
            <div className="mt-6 space-y-3">
              <button className="w-full py-3 bg-[var(--pb-surface)] border border-[var(--pb-border)] rounded-xl text-sm font-medium text-[var(--pb-fg2)] text-left px-4 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">Notification preferences</button>
              <button className="w-full py-3 bg-[var(--pb-surface)] border border-[var(--pb-border)] rounded-xl text-sm font-medium text-[var(--pb-fg2)] text-left px-4 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">Shipping addresses</button>
              <button className="w-full py-3 bg-[var(--pb-surface)] border border-[var(--pb-border)] rounded-xl text-sm font-medium text-[var(--pb-fg2)] text-left px-4 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">Payment methods</button>
              <button className="w-full py-3 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl text-sm font-medium text-red-600 dark:text-red-400 text-left px-4 hover:bg-red-100 dark:hover:bg-red-900/30 transition-colors">Sign out</button>
            </div>
          </div>
        )}
      </div>
      {screen !== 'detail' && (
        <nav className="fixed bottom-0 left-0 right-0 z-40 bg-[var(--pb-surface)]/95 backdrop-blur-xl border-t border-[var(--pb-border)]">
          <div className="max-w-[480px] mx-auto flex items-center justify-around py-2 pb-[max(8px,env(safe-area-inset-bottom))]">
            {navItems.map((item) => {
              const active = screen === item.id;
              return (
                <button key={item.id} onClick={() => setScreen(item.id)} className={`flex flex-col items-center gap-0.5 px-3 py-1.5 rounded-xl transition-colors ${active ? 'text-[var(--pb-accent)]' : 'text-[var(--pb-muted)] hover:text-[var(--pb-fg2)]'}`}>
                  <item.icon className="w-5 h-5" />
                  <span className="text-[10px] font-medium">{item.label}</span>
                </button>
              );
            })}
          </div>
        </nav>
      )}
      {roleMenu && <div className="fixed inset-0 z-30" onClick={() => setRoleMenu(false)} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
